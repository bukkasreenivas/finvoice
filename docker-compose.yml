version: "3.9"

# Local development stack.
# Production deployment uses a split architecture:
#   Frontend  → Vercel
#   Backend   → Railway  (supports WebSockets and long-running processes)
#   Database  → Supabase (PostgreSQL 15 + pgvector, free tier)
#   Cache     → Upstash  (serverless Redis, free tier)
#   Voice     → Deepgram API (managed, set DEEPGRAM_API_KEY in prod)

services:
  backend:
    # Production equivalent: Railway service
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finvoice:finvoice@db:5432/finvoice
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FINVU_CLIENT_ID=${FINVU_CLIENT_ID}
      - FINVU_CLIENT_SECRET=${FINVU_CLIENT_SECRET}
      - AA_ENV=${AA_ENV:-sandbox}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    # Production equivalent: Vercel
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  db:
    # Production equivalent: Supabase (PostgreSQL 15 + pgvector enabled by default)
    # Replace DATABASE_URL with your Supabase connection string in production.
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=finvoice
      - POSTGRES_PASSWORD=finvoice
      - POSTGRES_DB=finvoice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finvoice"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # Production equivalent: Upstash (serverless Redis, free tier)
    # Replace REDIS_URL with your Upstash connection string in production.
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
